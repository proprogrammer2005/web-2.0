services:
  web:
    build: .
    container_name: lab4-web
    ports:
      - "8080:80"  
    volumes:
      - ./www:/var/www/html        
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: lab4-db
    environment:
      MYSQL_ROOT_PASSWORD: root123      
      MYSQL_DATABASE: lab4_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appPass
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: lab4-pma
    ports:
      - "8081:80"                       
    environment:
      PMA_HOST: db
      PMA_PASSWORD: root123
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  db-data: