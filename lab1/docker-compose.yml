version: '3.9'

services:
  web:
    build: .
    container_name: lab1-web
    ports:
      - "8080:80"          
    depends_on:
      - db
    networks:
      - app-net

  db:
    image: mysql:8.0
    container_name: lab1-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123      
      MYSQL_DATABASE: lab1_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appPass2026
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - app-net

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: lab1-pma
    restart: always
    ports:
      - "8081:80"                       
    environment:
      PMA_HOST: db
      PMA_PASSWORD: root123
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db-data: